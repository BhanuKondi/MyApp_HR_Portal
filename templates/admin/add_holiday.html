{% extends "admin/admin_base.html" %}
{% block title %}Add Holiday{% endblock %}

{% block content %}
<div class="workspace-hero">
    <div>
        <p class="eyebrow mb-2">Holiday Calendar</p>
        <h2 class="fw-bold mb-1">Add New Holiday</h2>
        <p class="text-muted mb-0">Create a new holiday entry for the leave calendar used across the organization.</p>
    </div>
</div>

<div class="section-card">
    <form method="POST" action="">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Holiday Name</label>
                <input type="text" name="occasion" class="form-control" required placeholder="e.g., Independence Day">
            </div>
            <div class="col-md-6">
                <label class="form-label">Date</label>
                <input type="date" name="date" class="form-control" required>
            </div>
            <div class="col-12 d-flex gap-2 justify-content-end">
                <a href="{{ url_for('admin_leaves.leave_management') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Add Holiday</button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
