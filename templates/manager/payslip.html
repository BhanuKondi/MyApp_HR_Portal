{% extends "manager/manager_base.html" %}
{% block content %}

<div class="workspace-hero">
    <div>
        <p class="eyebrow mb-2">Payroll Documents</p>
        <h3 class="fw-bold mb-1">Download Payslip</h3>
        <p class="text-muted mb-0">Select a payroll month to generate and download your payslip PDF.</p>
    </div>
</div>

<div class="section-card">
    <form method="POST" action="{{ url_for('manager_payroll.download_payslip') }}">
        <div class="row g-3 align-items-end">
            <div class="col-md-6">
                <label class="form-label">Payroll Month</label>
                <input type="month" name="pay_month" class="form-control" required>
            </div>
            <div class="col-md-6">
                <button class="btn btn-primary w-100">Download Payslip</button>
            </div>
        </div>
    </form>
</div>

{% endblock %}
