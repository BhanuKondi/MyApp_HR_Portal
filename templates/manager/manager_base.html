<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary px-4">
    <a class="navbar-brand fw-bold text-white" href="#">ATIKES HR Management</a>

    <div class="ms-auto dropdown">
        <a class="btn btn-outline-light dropdown-toggle" href="#" role="button"
           id="settingsDropdown" data-bs-toggle="dropdown" aria-expanded="false">
            {{ session.email }}
        </a>
        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="settingsDropdown">
            <li><a class="dropdown-item" href="{{ url_for('settings.change_password') }}">Change Password</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="{{ url_for('auth.logout') }}">Logout</a></li>
        </ul>
    </div>
</nav>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="bg-light sidebar p-3" style="width: 260px; min-height: 100vh;">
        <ul class="nav flex-column">

            <li class="nav-item">
                <a href="{{ url_for('manager.dashboard') }}" 
                   class="nav-link sidebar-item {% if '/manager/dashboard' in request.path %}active{% endif %}">
                   Dashboard
                </a>
            </li>

            <li class="nav-item">
                <a href="{{ url_for('manager.profile') }}"
                   class="nav-link sidebar-item {% if '/manager/profile' in request.path %}active{% endif %}">
                   Profile
                </a>
            </li>
            
            <li class="nav-item">
    <a href="{{ url_for('manager_team_bp.team_page') }}"
       class="nav-link sidebar-item {% if '/manager/team' in request.path %}active{% endif %}">
       My Reportees
    </a>
</li>


            <li class="nav-item">
                <a href="{{ url_for('manager_attendance_bp.attendance_page') }}"
                   class="nav-link sidebar-item {% if '/manager/attendance' in request.path %}active{% endif %}">
                   Attendance
                </a>
            </li>

            <li class="nav-item">
    <a href="{{ url_for('manager_leaves.leave_management') }}"
       class="nav-link sidebar-item 
       {% if request.path.startswith('/manager/leaves') %}active{% endif %}">
        Leave Management
    </a>
</li>
            <li class="nav-item">
    <a href="{{ url_for('manager_payroll.payslip_page') }}"
       class="nav-link sidebar-item 
       {% if request.path.startswith('/manager/payroll') %}active{% endif %}">
        <i class="bi bi-file-earmark-pdf"></i> Download Payslip
    </a>
</li>
        </ul>
    </div>

    <!-- MAIN CONTENT -->
    <div class="p-4" style="width: 100%;">
        {% block content %}{% endblock %}
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
