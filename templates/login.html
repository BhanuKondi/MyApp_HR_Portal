<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AtikeS HR — Sign In</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
  <div class="login-layout">
    <section class="login-aside">
      <div class="login-logo-showcase">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="ATIKES Logo" class="login-hero-logo">
      </div>
    </section>

    <section class="login-panel">
      <div class="login-card">
        <h1>Sign in</h1>
        <p>Use your assigned work account to access the HR portal.</p>

        <form action="/login" method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

          <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input id="email" name="email" class="form-control" type="email" placeholder="Enter your email" required>
          </div>

          <div class="mb-3">
            <label class="form-label" for="password">Password</label>
            <input id="password" name="password" class="form-control" type="password" placeholder="Enter your password" required>
          </div>

          <button type="submit" class="btn btn-primary w-100 py-3">Sign In</button>

          {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
              <div class="login-note {{ messages[0][0] }}">
                {{ messages[0][1] }}
              </div>
            {% else %}
              <div class="login-note info">
                Secure access for your HR workspace.
              </div>
            {% endif %}
          {% endwith %}
        </form>
      </div>
    </section>
  </div>
</body>
</html>
